name: Create Deployment Metadata
description: Creates deployment metadata JSON for Workflow C

inputs:
  commit_sha:
    description: Full commit SHA used to build Docker images
    required: true

  build_matrix:
    description: JSON array of services built by Workflow B
    required: true

  aws_region:
    description: AWS region where ECR/EKS resources exist
    required: true

  aws_account_id:
    description: AWS account ID that owns the ECR repositories
    required: true

  output_file:
    description: Path where deployment metadata JSON should be written
    required: false
    default: deployment-metadata/deployment-metadata.json

outputs:
  metadata_file:
    description: Path to the generated deployment metadata file

runs:
  using: node20
  main: index.js