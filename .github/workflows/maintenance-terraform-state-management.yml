name: Terraform State Management

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "terraform/state-management/**"
      - ".github/workflows/maintenance-terraform-state-management.yml"

permissions:
  contents: read

concurrency:
  group: terraform-state-management
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/state-management
  TERRAFORM_VERSION: 1.9.8

jobs:
  terraform-state-management:
    name: Apply Terraform State Management
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials for bootstrap
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
