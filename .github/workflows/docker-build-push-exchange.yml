name: Workflow B - Build and Push to Amazon ECR

on:
  push:
    branches:
      - main
    paths:
      - 'naming-server/**'
      - 'api-gateway/**'
      - 'currency-exchange-service/**'
      - 'currency-conversion-service/**'
      - '.github/workflows/docker-build-push-exchange.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 295504962032

concurrency:
  group: workflow-b-ecr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      naming_server: ${{ steps.filter.outputs.naming_server }}
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      currency_exchange_service: ${{ steps.filter.outputs.currency_exchange_service }}
      currency_conversion_service: ${{ steps.filter.outputs.currency_conversion_service }}
      workflow_file: ${{ steps.filter.outputs.workflow_file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            naming_server:
              - 'naming-server/**'
            api_gateway:
              - 'api-gateway/**'
            currency_exchange_service:
              - 'currency-exchange-service/**'
            currency_conversion_service:
              - 'currency-conversion-service/**'
            workflow_file:
              - '.github/workflows/docker-build-push-exchange.yml'

  build-and-push:
    name: Build and Push - ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: naming-server
            service_path: naming-server
            service_changed: ${{ needs.detect-changes.outputs.naming_server }}
            ecr_repository: naming-server

          - service_name: api-gateway
            service_path: api-gateway
            service_changed: ${{ needs.detect-changes.outputs.api_gateway }}
            ecr_repository: api-gateway

          - service_name: currency-exchange-service
            service_path: currency-exchange-service
            service_changed: ${{ needs.detect-changes.outputs.currency_exchange_service }}
            ecr_repository: currency-exchange-service

          - service_name: currency-conversion-service
            service_path: currency-conversion-service
            service_changed: ${{ needs.detect-changes.outputs.currency_conversion_service }}
            ecr_repository: currency-conversion-service

    steps:
      - name: Checkout code
        if: ${{ matrix.service_changed == 'true' || needs.detect-changes.outputs.workflow_file == 'true' }}
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: ${{ matrix.service_changed == 'true' || needs.detect-changes.outputs.workflow_file == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: ${{ matrix.service_changed == 'true' || needs.detect-changes.outputs.workflow_file == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image values
        if: ${{ matrix.service_changed == 'true' || needs.detect-changes.outputs.workflow_file == 'true' }}
        id: image
        shell: bash
        run: |
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repository }}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: ${{ matrix.service_changed == 'true' || needs.detect-changes.outputs.workflow_file == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service_path }}
          file: ./${{ matrix.service_path }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}:${{ steps.image.outputs.latest_tag }}
            ${{ steps.image.outputs.image_uri }}:${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max