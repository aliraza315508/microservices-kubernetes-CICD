name: Workflow B - Build and Push to Amazon ECR

on:
  workflow_run:
    workflows:
      - Java CI - Microservices
    types:
      - completed

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 295504962032

concurrency:
  group: workflow-b-ecr-main
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      changed_count: ${{ steps.matrix.outputs.changed_count }}

    steps:
      - name: Checkout code at upstream SHA
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install local action dependencies
        working-directory: ./.github/actions/prepare-build-matrix
        run: npm install

      - name: Prepare build matrix
        id: matrix
        uses: ./.github/actions/prepare-build-matrix
        with:
          current_sha: ${{ github.event.workflow_run.head_sha }}

      - name: Show selected services
        run: | 
          echo "Changed count: ${{ steps.matrix.outputs.changed_count }}"
          echo 'Build matrix: ${{ steps.matrix.outputs.build_matrix }}'

      

  build-and-push:
    name: Build and Push - ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_count != '0' }}


    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.build_matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image values
        id: image
        shell: bash
        run: |
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repository }}"
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA::7}"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service_path }}
          file: ./${{ matrix.service_path }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}:${{ steps.image.outputs.latest_tag }}
            ${{ steps.image.outputs.image_uri }}:${{ steps.image.outputs.sha_tag }}